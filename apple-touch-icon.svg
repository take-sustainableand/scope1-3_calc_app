    <path d="M88 38 L80 22"  stroke="#9DBA92" stroke-width="3.6" opacity="0.85"/>
    <path d="M92 100 L114 122" stroke="#9DBA92" stroke-width="3.6" opacity="0.85"/>
    <path d="M82 152 L92 168" stroke="#9DBA92" stroke-width="3.6" opacity="0.85"/>
