<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="S&amp;Carbon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F3A1A"/>
      <stop offset="100%" stop-color="#3D6634"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="38" ry="38" fill="url(#bg)"/>
  <!-- subtle leaf body silhouette behind the S, low opacity for depth -->
  <path d="M52 24 C100 24 152 60 152 100 C152 144 116 162 86 162 C56 162 32 144 32 112 C32 76 56 38 90 26 Z"
        fill="#EEF4EC" opacity="0.06"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main S-shaped leaf vein (the monogram itself) -->
    <path d="M134 50 C120 38 92 34 76 40 C56 46 46 58 46 72 C46 86 60 96 84 100 C108 104 130 110 130 124 C130 142 116 154 92 154 C72 154 56 144 50 130"
          stroke="#EEF4EC" stroke-width="11"/>
